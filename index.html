<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cancionero del Grupo</title>
<style>
  /* ===== VARIABLES Y RESET ===== */
  :root {
    --accent: #C2410C;
    --accent-light: #EA580C;
    --accent-dim: rgba(194,65,12,0.15);
    --bg: #F7F5F2;
    --bg2: #EDEAE5;
    --bg3: #E0DCD5;
    --surface: #FFFFFF;
    --surface2: #F2EFE9;
    --border: #D4CFC8;
    --text: #1C1917;
    --text2: #57534E;
    --text3: #A8A29E;
    --chord-color: #C2410C;
    --section-color: #78716C;
    --tab-active-bg: #FFFFFF;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --radius: 10px;
    --font-mono: 'Courier Prime', 'Courier New', monospace;
    --font-display: 'Playfair Display', Georgia, serif;
    --font-body: 'Source Sans 3', 'Segoe UI', sans-serif;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #171310;
      --bg2: #1E1A17;
      --bg3: #262119;
      --surface: #242018;
      --surface2: #2C2720;
      --border: #3D3630;
      --text: #F5F0EB;
      --text2: #A8A29E;
      --text3: #57534E;
      --tab-active-bg: #2C2720;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
      --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden; /* El scroll lo maneja #app y #song-scroll-area */
  }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    transition: background 0.3s;
  }

  /* ===== TIPOGRAFÍAS EXTERNAS ===== */
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap');

  /* ===== PANTALLA DE PERFIL ===== */
  #profile-screen {
    height: 100%;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    background: var(--bg);
  }

  .profile-header {
    text-align: center;
    margin-bottom: 3rem;
  }

  .profile-header h1 {
    font-family: var(--font-display);
    font-size: clamp(2rem, 5vw, 3.5rem);
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.1;
  }

  .profile-header p {
    color: var(--text2);
    margin-top: 0.75rem;
    font-size: 1.05rem;
    font-weight: 300;
  }

  .profile-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.25rem;
    max-width: 600px;
    width: 100%;
  }

  @media (min-width: 640px) {
    .profile-grid {
      grid-template-columns: repeat(4, 1fr);
      max-width: 780px;
    }
  }

  .profile-card {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    transition: all 0.2s ease;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .profile-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent-dim);
    opacity: 0;
    transition: opacity 0.2s;
  }

  .profile-card:hover {
    border-color: var(--accent);
    transform: translateY(-3px);
    box-shadow: var(--shadow-lg);
  }

  .profile-card:hover::before { opacity: 1; }

  .profile-card:active {
    transform: translateY(0);
  }

  .profile-icon {
    font-size: 2.8rem;
    line-height: 1;
  }

  .profile-instrument {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--accent);
  }

  .profile-name {
    font-family: var(--font-display);
    font-size: 1.25rem;
    color: var(--text);
    text-align: center;
  }

  /* ===== APP PRINCIPAL ===== */
  #app {
    display: none;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  /* ===== HEADER ===== */
  .app-header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 1.25rem;
    height: 56px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 100;
    box-shadow: var(--shadow);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .back-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    padding: 0.4rem;
    border-radius: 6px;
    display: flex;
    align-items: center;
    font-size: 1.2rem;
    transition: color 0.15s, background 0.15s;
  }

  .back-btn:hover {
    color: var(--text);
    background: var(--bg2);
  }

  .header-title {
    font-family: var(--font-display);
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text);
    max-width: 200px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .current-profile-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-radius: 99px;
    padding: 0.25rem 0.75rem;
    cursor: pointer;
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 600;
    transition: all 0.15s;
  }

  .current-profile-badge:hover {
    background: var(--accent);
    color: white;
  }

  /* ===== NAVEGACIÓN PRINCIPAL ===== */
  #song-list-view {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  #song-detail-view {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }

  /* ===== LISTA DE CANCIONES ===== */
  .song-list-container {
    max-width: 700px;
    margin: 0 auto;
    padding: 1.5rem 1.25rem;
  }

  .song-list-welcome {
    margin-bottom: 1.75rem;
  }

  .song-list-welcome h2 {
    font-family: var(--font-display);
    font-size: 1.5rem;
    color: var(--text);
  }

  .song-list-welcome p {
    color: var(--text2);
    font-size: 0.9rem;
    margin-top: 0.25rem;
  }

  .songs-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .song-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.1rem 1.25rem;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }

  .song-card:hover {
    border-color: var(--accent);
    transform: translateX(4px);
    box-shadow: var(--shadow-lg);
  }

  .song-card-info { flex: 1; min-width: 0; }

  .song-card-title {
    font-family: var(--font-display);
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .song-card-artist {
    font-size: 0.82rem;
    color: var(--text2);
    margin-top: 0.15rem;
  }

  .song-card-arrow {
    color: var(--text3);
    font-size: 1.2rem;
    margin-left: 1rem;
    flex-shrink: 0;
    transition: color 0.15s, transform 0.15s;
  }

  .song-card:hover .song-card-arrow {
    color: var(--accent);
    transform: translateX(3px);
  }

  /* ===== TOOLBAR DE CANCIÓN ===== */
  .song-toolbar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 0.5rem 1rem;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 0.4rem;
    flex-shrink: 0;
    z-index: 10;
  }

  .toolbar-group {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.2rem 0.4rem;
  }

  .toolbar-label {
    font-size: 0.72rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    padding: 0 0.2rem;
  }

  .tbtn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text2);
    font-size: 0.82rem;
    font-weight: 600;
    padding: 0.3rem 0.5rem;
    border-radius: 5px;
    transition: all 0.15s;
    min-width: 28px;
    text-align: center;
    font-family: var(--font-body);
  }

  .tbtn:hover { background: var(--bg2); color: var(--text); }
  .tbtn.active { background: var(--accent); color: white; }

  .tbtn-icon {
    font-size: 1rem;
    padding: 0.3rem;
  }

  .transpose-display {
    font-size: 0.8rem;
    font-weight: 700;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
    font-family: var(--font-mono);
  }

  .scroll-speed-display {
    font-size: 0.75rem;
    color: var(--text2);
    min-width: 32px;
    text-align: center;
    font-family: var(--font-mono);
  }

  /* ===== PESTAÑAS DE INSTRUMENTO ===== */
  .instrument-tabs {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    display: flex;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    flex-shrink: 0;
  }

  .instrument-tabs::-webkit-scrollbar { display: none; }

  .itab {
    flex-shrink: 0;
    padding: 0.75rem 1rem;
    border: none;
    border-bottom: 3px solid transparent;
    background: none;
    cursor: pointer;
    color: var(--text2);
    font-size: 0.82rem;
    font-weight: 600;
    font-family: var(--font-body);
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    white-space: nowrap;
  }

  .itab:hover {
    color: var(--text);
    background: var(--bg3);
  }

  .itab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: var(--tab-active-bg);
  }

  .itab-icon { font-size: 1rem; }

  /* ===== ÁREA DE SCROLL DE CONTENIDO ===== */
  #song-scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    min-height: 0;
  }

  /* ===== CONTENIDO DE PESTAÑA ===== */
  .tab-content-wrapper {
    max-width: 820px;
    margin: 0 auto;
  }

  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ===== VISTA COMÚN — CANCIÓN ===== */
  .song-view {
    padding: 1.5rem 1.25rem 4rem;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }

  .song-meta-header {
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .song-main-title {
    font-family: var(--font-display);
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  .song-main-artist {
    color: var(--text2);
    font-size: 0.95rem;
    margin-top: 0.25rem;
  }

  .song-edit-info {
    font-size: 0.72rem;
    color: var(--text3);
    margin-top: 0.5rem;
  }

  .song-content {
    font-family: var(--font-mono);
    font-size: 1rem;
    line-height: 1.85;
    white-space: pre;
    overflow-x: auto;
    color: var(--text);
  }

  /* En móvil: wrap para que los acordes no escapen lateralmente */
  @media (max-width: 599px) {
    .song-content {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.88rem;
      line-height: 1.75;
    }
    .zoom-1 .song-content { font-size: 0.7rem; line-height: 1.55; }
    .zoom-2 .song-content { font-size: 0.79rem; line-height: 1.65; }
    .zoom-3 .song-content { font-size: 0.88rem; line-height: 1.75; }
    .zoom-4 .song-content { font-size: 0.99rem; line-height: 1.85; }
    .zoom-5 .song-content { font-size: 1.12rem; line-height: 1.95; }
  }

  /* Tablet */
  @media (min-width: 600px) and (max-width: 1023px) {
    .song-content {
      font-size: 0.95rem;
    }
    .zoom-1 .song-content { font-size: 0.75rem; }
    .zoom-2 .song-content { font-size: 0.85rem; }
    .zoom-3 .song-content { font-size: 0.95rem; }
    .zoom-4 .song-content { font-size: 1.07rem; }
    .zoom-5 .song-content { font-size: 1.2rem; }
  }

  .song-content .chord-line {
    color: var(--chord-color);
    font-weight: 700;
  }

  .song-content .section-label {
    color: var(--section-color);
    font-style: italic;
    font-weight: 400;
  }

  /* Zoom levels */
  .zoom-1 .song-content { font-size: 0.78rem; line-height: 1.6; }
  .zoom-2 .song-content { font-size: 0.88rem; line-height: 1.7; }
  .zoom-3 .song-content { font-size: 1rem; line-height: 1.85; }
  .zoom-4 .song-content { font-size: 1.14rem; line-height: 1.95; }
  .zoom-5 .song-content { font-size: 1.3rem; line-height: 2.05; }

  /* ===== PESTAÑA DE INSTRUMENTO ===== */
  .annotation-view {
    padding: 1.5rem 1.25rem 4rem;
  }

  .annotation-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem 1rem;
    text-align: center;
    gap: 1rem;
    color: var(--text2);
  }

  .annotation-empty-icon { font-size: 2.5rem; opacity: 0.4; }
  .annotation-empty-msg { font-size: 0.95rem; line-height: 1.5; }

  .btn-add-annotation {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.65rem 1.4rem;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-body);
    transition: all 0.15s;
  }

  .btn-add-annotation:hover { background: var(--accent-light); }

  .annotation-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    padding-bottom: 0.75rem;
    border-bottom: 1px solid var(--border);
  }

  .annotation-owner-badge {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.82rem;
    color: var(--text2);
  }

  .btn-edit-annotation {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.75rem;
    font-size: 0.8rem;
    cursor: pointer;
    color: var(--text2);
    font-family: var(--font-body);
    transition: all 0.15s;
  }

  .btn-edit-annotation:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .annotation-content {
    font-family: var(--font-mono);
    font-size: 0.95rem;
    line-height: 1.8;
    white-space: pre-wrap;
    color: var(--text);
    background: var(--surface2);
    border-radius: 8px;
    padding: 1.1rem;
    border: 1px solid var(--border);
  }

  .annotation-edit-info {
    font-size: 0.7rem;
    color: var(--text3);
    margin-top: 0.5rem;
  }

  /* ===== MODAL DE EDICIÓN ===== */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(3px);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  @media (min-width: 640px) {
    .modal-overlay {
      align-items: center;
    }
  }

  .modal {
    background: var(--surface);
    border-radius: var(--radius) var(--radius) 0 0;
    width: 100%;
    max-width: 720px;
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    transform: translateY(40px);
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    box-shadow: var(--shadow-lg);
  }

  .modal-overlay.open .modal {
    transform: translateY(0);
  }

  @media (min-width: 640px) {
    .modal {
      border-radius: var(--radius);
      max-height: 85vh;
    }
  }

  .modal-header {
    padding: 1.1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .modal-title {
    font-family: var(--font-display);
    font-size: 1.1rem;
    color: var(--text);
  }

  .modal-close {
    background: none;
    border: none;
    color: var(--text3);
    font-size: 1.4rem;
    cursor: pointer;
    padding: 0.2rem;
    transition: color 0.15s;
    line-height: 1;
  }

  .modal-close:hover { color: var(--text); }

  .modal-body {
    padding: 1.25rem;
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .field-label {
    font-size: 0.78rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    margin-bottom: 0.4rem;
    display: block;
  }

  .field-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.65rem 0.85rem;
    font-family: var(--font-body);
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }

  .field-input:focus {
    border-color: var(--accent);
  }

  .field-textarea {
    font-family: var(--font-mono);
    font-size: 0.88rem;
    line-height: 1.7;
    resize: vertical;
    min-height: 280px;
    tab-size: 2;
  }

  .modal-footer {
    padding: 1rem 1.25rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: flex-end;
    gap: 0.75rem;
  }

  .btn-cancel {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.6rem 1.2rem;
    font-size: 0.9rem;
    cursor: pointer;
    color: var(--text2);
    font-family: var(--font-body);
    transition: all 0.15s;
  }

  .btn-cancel:hover {
    border-color: var(--text2);
    color: var(--text);
  }

  .btn-save {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 0.6rem 1.4rem;
    font-size: 0.9rem;
    cursor: pointer;
    color: white;
    font-weight: 600;
    font-family: var(--font-body);
    transition: background 0.15s;
  }

  .btn-save:hover { background: var(--accent-light); }

  /* ===== AUTO-SCROLL INDICATOR ===== */
  .scroll-indicator {
    position: fixed;
    bottom: 1.25rem;
    right: 1.25rem;
    width: 48px;
    height: 48px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    color: white;
    box-shadow: 0 4px 16px rgba(194,65,12,0.4);
    cursor: pointer;
    z-index: 50;
    opacity: 0;
    transform: scale(0.8);
    transition: all 0.2s;
    pointer-events: none;
    border: none;
  }

  .scroll-indicator.visible {
    opacity: 1;
    transform: scale(1);
    pointer-events: all;
  }

  .sync-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 0.3rem 0.65rem;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    color: var(--text2);
    font-family: var(--font-body);
    transition: all 0.15s;
    white-space: nowrap;
  }

  .sync-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-dim);
  }

  .sync-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .sync-status {
    font-size: 0.8rem;
    font-weight: 600;
    padding: 0.25rem 0.6rem;
    border-radius: 99px;
    white-space: nowrap;
    transition: all 0.2s;
  }

  .sync-status.ok    { background: #D1FAE5; color: #065F46; }
  .sync-status.busy  { background: #FEF3C7; color: #92400E; }
  .sync-status.dirty { background: #FFE4D6; color: #9A3412; }

<script>
// ============================================================
// === PEGAR AQUÍ firebaseConfig ===
// ============================================================
const firebaseConfig = {
  apiKey: "AIzaSyAvGwDEANYAnUOSEfY3xQVJEDyy2xvWVig",
  authDomain: "es-cuestion-de-organizarse.firebaseapp.com",

  storageBucket: "es-cuestion-de-organizarse.firebasestorage.app",
  messagingSenderId: "397748807873",
  appId: "1:397748807873:web:7d8ce4c5570ab89b588c40"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const CANCIONERO_ID = 'grupo_principal';
const SONGS_COL = () => db.collection('cancioneros').doc(CANCIONERO_ID).collection('canciones');

// ============================================================
// SINCRONIZACIÓN FIREBASE
// ============================================================

const syncStatusEl  = document.getElementById('sync-status');
const btnUpload     = document.getElementById('btn-upload');
const btnDownload   = document.getElementById('btn-download');

function setSyncStatus(state) {
  // state: 'ok' | 'busy' | 'dirty' | 'error'
  const labels = {
    ok:    '✓ Sincronizado',
    busy:  '⏳ Sincronizando…',
    dirty: '⚠ Cambios sin subir',
    error: '✗ Error de red'
  };
  syncStatusEl.textContent = labels[state] || '';
  syncStatusEl.className = `sync-status ${state}`;
  // Guardar en localStorage para restaurar al recargar
  localStorage.setItem('cancionero_sync_status', state);
}

function initSyncStatus() {
  const saved = localStorage.getItem('cancionero_sync_status');
  // Si hay datos locales y no se ha subido nunca, marcar como dirty
  setSyncStatus(saved === 'ok' ? 'ok' : 'dirty');
}

// ---- SUBIR A LA NUBE ----
async function uploadToCloud() {
  setSyncStatus('busy');
  btnUpload.disabled = true;
  btnDownload.disabled = true;
  try {
    const songs = JSON.parse(localStorage.getItem('cancionero_songs') || '[]');
    const batch = db.batch();
    for (const song of songs) {
      const ref = SONGS_COL().doc(song.id);
      // Separar anotaciones del resto
      const { annotations, ...songData } = song;
      const docData = {
        ...songData,
        annotations: annotations || {},
        syncedAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      batch.set(ref, docData);
    }
    await batch.commit();
    setSyncStatus('ok');
    showToast('✓ Datos subidos a la nube');
  } catch (err) {
    console.error('Upload error:', err);
    setSyncStatus('error');
    showToast('Error al subir. Comprueba la conexión.');
  } finally {
    btnUpload.disabled = false;
    btnDownload.disabled = false;
  }
}

// ---- TRAER DE LA NUBE ----
async function downloadFromCloud() {
  setSyncStatus('busy');
  btnUpload.disabled = true;
  btnDownload.disabled = true;
  try {
    const snapshot = await SONGS_COL().get();
    if (snapshot.empty) {
      showToast('La nube está vacía. Sube primero tus datos.');
      setSyncStatus('dirty');
      return;
    }
    const cloudSongs = [];
    snapshot.forEach(doc => cloudSongs.push({ id: doc.id, ...doc.data() }));

    // Detectar conflictos: comparar updatedAt local vs nube
    const localSongs = JSON.parse(localStorage.getItem('cancionero_songs') || '[]');
    const conflicts = [];
    for (const cloudSong of cloudSongs) {
      const localSong = localSongs.find(s => s.id === cloudSong.id);
      if (localSong && localSong.updatedAt && cloudSong.updatedAt) {
        const localTime = new Date(localSong.updatedAt).getTime();
        // Firestore Timestamp → milliseconds
        const cloudTime = cloudSong.updatedAt.toMillis
          ? cloudSong.updatedAt.toMillis()
          : new Date(cloudSong.updatedAt).getTime();
        if (localTime > cloudTime) {
          conflicts.push(cloudSong.title);
        }
      }
    }

    if (conflicts.length > 0) {
      const msg = `⚠ Tienes cambios locales más recientes en:\n• ${conflicts.join('\n• ')}\n\n¿Sobreescribir con los datos de la nube?`;
      if (!confirm(msg)) {
        setSyncStatus('dirty');
        btnUpload.disabled = false;
        btnDownload.disabled = false;
        return;
      }
    }

    // Normalizar timestamps de Firestore a ISO string
    const normalized = cloudSongs.map(song => {
      const s = { ...song };
      if (s.updatedAt && s.updatedAt.toDate) s.updatedAt = s.updatedAt.toDate().toISOString();
      if (s.syncedAt && s.syncedAt.toDate) delete s.syncedAt;
      // Normalizar timestamps dentro de annotations
      if (s.annotations) {
        for (const key of Object.keys(s.annotations)) {
          const ann = s.annotations[key];
          if (ann && ann.updatedAt && ann.updatedAt.toDate) {
            ann.updatedAt = ann.updatedAt.toDate().toISOString();
          }
        }
      }
      // Asegurar que youtube se preserva desde los defaults si no viene de la nube
      if (!s.youtube) {
        const def = DEFAULT_SONGS.find(d => d.id === s.id);
        if (def && def.youtube) s.youtube = def.youtube;
      }
      return s;
    });

    localStorage.setItem('cancionero_songs', JSON.stringify(normalized));
    state.songs = normalized;
    renderSongList();
    if (state.currentSongId) renderSongDetail();
    setSyncStatus('ok');
    showToast('✓ Datos traídos de la nube');
  } catch (err) {
    console.error('Download error:', err);
    setSyncStatus('error');
    showToast('Error al descargar. Comprueba la conexión.');
  } finally {
    btnUpload.disabled = false;
    btnDownload.disabled = false;
  }
}

// DATOS Y ESTADO
// ============================================================

const PROFILES = {
  guitarra1: { name: 'Hilario', instrument: 'Guitarra 1', icon: '🎸' },
  guitarra2: { name: 'Omar',    instrument: 'Guitarra 2', icon: '🎸' },
  bajo:      { name: 'Naky',    instrument: 'Bajo',        icon: '🎵' },

};

  { key: 'bajo',      name: 'Naky',    icon: '🎵' },
  { key: 'bateria',   name: 'Mai',     icon: '🥁' }
];

const DEFAULT_SONGS = [
  {
    "id": "s_disimular",
    "title": "Disimular",

// ============================================================
// ACORDES: ESCALAS
// ============================================================

const SCALE_LAT = ['DO','DO#','RE','RE#','MI','FA','FA#','SOL','SOL#','LA','LA#','SI'];
const SCALE_ANG = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

// Alias: Db=C#, Eb=D#, etc. (para anglosajona)
const ANG_ALIASES = { 'Db':'C#','Eb':'D#','Gb':'F#','Ab':'G#','Bb':'A#' };
// Alias latina: REb=DO#, MIb=RE#, etc.
const LAT_ALIASES = { 'DOb':'SI','DOsus2':'DOsus2','DOsus4':'DOsus4','REb':'DO#','MIb':'RE#','FAb':'MI','SOLb':'FA#','LAb':'SOL#','SIb':'LA#','SIsus2':'SIsus2','SIsus4':'SIsus4' };

// Acordes que NO deben transponerse (etiquetas de estructura, texto)
const SECTION_LABELS = /^\[.*\]$|^(ESTRIBILLO|INTRO|VERSO|PUENTE|CODA|SOLO|PRE-?ESTRIBILLO|PUENTEAR|Tono:).*$/i;

function normalizeLat(chord) {
  // Devuelve el índice en SCALE_LAT, o -1 si no es acorde reconocible
  // Soporta sufijos: m, #, b, maj, min, sus2, sus4, add, dim, aug, 7, 9, 11, 13, /bajo
  const match = chord.match(/^(DO#?b?|RE#?b?|MIb?|FA#?b?|SOL#?b?|LAb?#?|SIb?)(.*)/);
  if (!match) return { root: -1, suffix: '' };
  let root = match[1];
  const suffix = match[2];
  // Normalizar alias
  if (LAT_ALIASES[root] !== undefined && LAT_ALIASES[root] !== root) {
    const a = LAT_ALIASES[root];
    if (SCALE_LAT.includes(a)) root = a;
  }
  const idx = SCALE_LAT.indexOf(root);
  return { root: idx, suffix };
}

function normalizeAng(chord) {
  const match = chord.match(/^([A-G][#b]?)(.*)/);
  if (!match) return { root: -1, suffix: '' };
  let root = match[1];
  const suffix = match[2];
  if (ANG_ALIASES[root]) root = ANG_ALIASES[root];
  const idx = SCALE_ANG.indexOf(root);
  return { root: idx, suffix };
}

function transposeChord(chord, semitones, notation) {
  // notation: 'lat' | 'ang'
  if (semitones === 0 && notation === 'lat') return chord; // sin cambio
  
  // Detectar si tiene bajo (e.g. DO/SOL)
  const slashMatch = chord.match(/^(.+)\/(.+)$/);
  if (slashMatch) {
    const t1 = transposeChord(slashMatch[1], semitones, notation);
    const t2 = transposeChord(slashMatch[2], semitones, notation);
    return `${t1}/${t2}`;
  }

  // Intentar como latino primero
  const lat = normalizeLat(chord);
  if (lat.root !== -1) {
    const newIdx = ((lat.root + semitones) % 12 + 12) % 12;
    const scale = notation === 'ang' ? SCALE_ANG : SCALE_LAT;
    return scale[newIdx] + lat.suffix;
  }

  // Intentar como anglosajón
  const ang = normalizeAng(chord);
  if (ang.root !== -1) {
    const newIdx = ((ang.root + semitones) % 12 + 12) % 12;
    const scale = notation === 'ang' ? SCALE_ANG : SCALE_LAT;
    return scale[newIdx] + ang.suffix;
  }

  return chord; // No reconocido, devolver tal cual
}

// ============================================================
// DETECCIÓN DE LÍNEAS DE ACORDES
// ============================================================

function isTabLine(line) {
  // Línea de tablatura: contiene muchos guiones
  return (line.match(/-/g) || []).length > 4;
}

function isChordToken(token) {
  if (!token || token.length === 0) return false;
  if (/^\d+$/.test(token)) return false;
  // Intentar reconocer como acorde latino o anglosajón
  const cleanToken = token.replace(/[()]/g, '');
  const lat = normalizeLat(cleanToken);
  if (lat.root !== -1) return true;
  const ang = normalizeAng(cleanToken);
  if (ang.root !== -1) return true;
  return false;
}

function isChordLine(line) {
  if (SECTION_LABELS.test(line.trim())) return false;
  if (isTabLine(line)) return false;
  const trimmed = line.trim();
  if (!trimmed) return false;
  const tokens = trimmed.split(/\s+/).filter(t => t.length > 0);
  if (tokens.length === 0) return false;
  const chordCount = tokens.filter(isChordToken).length;
  return chordCount / tokens.length > 0.5;
}

// ============================================================
// PROCESADO DE CONTENIDO CON TRANSPOSICIÓN Y NOTACIÓN
// ============================================================

function processContent(rawContent, semitones, notation) {
  const lines = rawContent.split('\n');
  return lines.map(line => {
    const trimmed = line.trim();
    
    // Línea vacía
    if (!trimmed) return { type: 'empty', text: '' };
    
    // Etiqueta de sección
    if (SECTION_LABELS.test(trimmed)) return { type: 'section', text: line };
    
    // Tablatura
    if (isTabLine(line)) return { type: 'tab', text: line };
    
    // Línea de acordes
    if (isChordLine(line)) {
      if (semitones === 0 && notation === 'lat') {
        return { type: 'chord', text: line };
      }
      // Transponer token a token preservando espacios
      const transposed = line.replace(/[A-Z][A-Za-z#b0-9]*(?:\/[A-Z][A-Za-z#b0-9]*)?/g, (match) => {
        // Skip tokens que parezcan palabras normales muy largas
        if (match.length > 8 && !/[#b]/.test(match)) return match;
        return transposeChord(match, semitones, notation);
      });
      return { type: 'chord', text: transposed };
    }
    
    // Línea de letra
    return { type: 'lyric', text: line };
  });
}

function renderContent(processed) {
  return processed.map(({ type, text }) => {
    if (type === 'empty') return '\n';
    if (type === 'section') {
      const escaped = escapeHtml(text);
      return `<span class="section-label">${escaped}</span>\n`;
    }
    if (type === 'chord') {
      const escaped = escapeHtml(text);
      return `<span class="chord-line">${escaped}</span>\n`;
    }
    return escapeHtml(text) + '\n';
  }).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

const LS_KEY_SONGS = 'cancionero_songs';
const LS_KEY_PROFILE = 'cancionero_profile';

function loadSongs() {
  try {
    const raw = localStorage.getItem(LS_KEY_SONGS);
    if (raw) {
      const songs = JSON.parse(raw);
      // Parchar URLs de YouTube si la canción almacenada no las tiene aún
      let patched = false;
      songs.forEach(song => {
        const def = DEFAULT_SONGS.find(d => d.id === song.id);
        if (def && def.youtube && !song.youtube) {
          song.youtube = def.youtube;
          patched = true;
        }
      });
      if (patched) saveSongs(songs);
      return songs;
    }
  } catch(e) {}
  // Inicializar con canciones por defecto
  const songs = DEFAULT_SONGS.map(s => ({
    ...s,
    updatedBy: null,
    updatedAt: null,
    annotations: {
      guitarra1: { content: '', updatedAt: null },
      guitarra2: { content: '', updatedAt: null },
      bajo:      { content: '', updatedAt: null },
      bateria:   { content: '', updatedAt: null }
    }
  }));
  saveSongs(songs);
  return songs;
}

function saveSongs(songs) {
  localStorage.setItem('cancionero_songs', JSON.stringify(songs));
  setSyncStatus('dirty');
}

function loadProfile() {
  return localStorage.getItem(LS_KEY_PROFILE) || null;
}

function saveProfile(profileKey) {
  localStorage.setItem(LS_KEY_PROFILE, profileKey);
}

function timeAgo(isoString) {
  if (!isoString) return null;
  const diff = Date.now() - new Date(isoString).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'ahora mismo';
  if (mins < 60) return `hace ${mins} min`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `hace ${hours}h`;
  const days = Math.floor(hours / 24);
  return `hace ${days}d`;
}

function init() {
  state.songs = loadSongs();
  const savedProfile = loadProfile();
  initSyncStatus();
  if (savedProfile && PROFILES[savedProfile]) {
    selectProfile(savedProfile);
  } else {
    showProfileScreen();
  }
  bindEvents();
}

// ============================================================

function showProfileScreen() {
  profileScreen.style.display = 'flex';
  appEl.style.display = 'none';
}

function selectProfile(profileKey) {
  state.profile = profileKey;
  saveProfile(profileKey);
  profileScreen.style.display = 'none';
  appEl.style.display = 'flex';
  const p = PROFILES[profileKey];
  profileBadge.textContent = `${p.icon} ${p.name}`;
  listWelcomeTitle.textContent = `Hola, ${p.name}`;
  showSongList();
}

function showSongList() {
  state.currentSongId = null;
  state.currentTab = 'common';
  stopScroll();
  songListView.classList.remove('hidden');
  songDetailView.classList.add('hidden');
  btnBack.classList.add('hidden');
  headerTitle.textContent = 'Cancionero';
  renderSongList();
}

function renderSongList() {
  const subtitle = document.getElementById('list-subtitle');
  if (subtitle) subtitle.textContent = `${state.songs.length} canciones · Toca para ver letra y acordes`;
  songsGrid.innerHTML = '';
  state.songs.forEach(song => {
    const card = document.createElement('div');
    card.className = 'song-card';
    card.innerHTML = `
      <div class="song-card-info">
        <div class="song-card-title">${escapeHtml(song.title)}</div>
        <div class="song-card-artist">${escapeHtml(song.artist)}</div>
      </div>
      <span class="song-card-arrow">›</span>
    `;
    card.addEventListener('click', () => openSong(song.id));
    songsGrid.appendChild(card);
  });
}

function openSong(songId) {
  state.currentSongId = songId;
  state.currentTab = 'common';
  state.semitones = 0;
  transposeDisplay.textContent = '0';
  songListView.classList.add('hidden');
  songDetailView.classList.remove('hidden');
  btnBack.classList.remove('hidden');
  const song = getSong(songId);
  headerTitle.textContent = song.title;
  renderSongDetail();
  setActiveTab('common');
}

function getSong(id) {
  return state.songs.find(s => s.id === id);
}

function renderSongDetail() {
  const song = getSong(state.currentSongId);
  if (!song) return;
  detailTitle.textContent = song.title;
  detailArtist.textContent = song.artist;
  if (song.updatedBy && song.updatedAt) {
    const pName = PROFILES[song.updatedBy]?.name || song.updatedBy;
    detailEditInfo.textContent = `Última edición: ${pName} · ${timeAgo(song.updatedAt)}`;
  } else {
    detailEditInfo.textContent = '';
  }
  // Render contenido común
  const processed = processContent(song.content, state.semitones, state.notation);
  songContent.innerHTML = renderContent(processed);
  // Actualizar zoom
  songView.className = `song-view zoom-${state.zoom}`;
  // Render anotaciones
  INSTRUMENT_TABS.forEach(({ key }) => {
    renderAnnotationPane(key);
  });
}

function renderAnnotationPane(key) {
  const song = getSong(state.currentSongId);
  if (!song) return;
  const ann = song.annotations[key];
  const pane = document.getElementById(`av-${key}`);
  const prof = PROFILES[key];
  const isOwner = state.profile === key;

  if (!ann || !ann.content) {
    // Vacío
    let html = `<div class="annotation-empty">
      <div class="annotation-empty-icon">${prof.icon}</div>
      <div class="annotation-empty-msg">${prof.name} aún no ha añadido sus anotaciones para esta canción.</div>`;
    if (isOwner) {
      html += `<button class="btn-add-annotation" onclick="openAnnotationEditor('${key}')">Añadir mis anotaciones</button>`;
    }
    html += `</div>`;
    pane.innerHTML = html;
  } else {
    const editBtn = isOwner
      ? `<button class="btn-edit-annotation" onclick="openAnnotationEditor('${key}')">Editar</button>`
      : '';
    const timeInfo = ann.updatedAt
      ? `<div class="annotation-edit-info">Actualizado ${timeAgo(ann.updatedAt)}</div>` : '';
    pane.innerHTML = `
      <div class="annotation-header">
        <span class="annotation-owner-badge">${prof.icon} <strong>${prof.name}</strong> · ${prof.instrument}</span>
        ${editBtn}
      </div>
      <pre class="annotation-content">${escapeHtml(ann.content)}</pre>
      ${timeInfo}
    `;
  }
}

function setActiveTab(tabKey) {
  state.currentTab = tabKey;
  // Botones
  document.querySelectorAll('.itab').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === tabKey);
  });
  // Paneles
  document.querySelectorAll('.tab-pane').forEach(pane => {
    pane.classList.remove('active');
  });
  const targetPane = tabKey === 'common' ? 'pane-common' : `pane-${tabKey}`;
  const paneEl = document.getElementById(targetPane);
  if (paneEl) paneEl.classList.add('active');
  // Scroll FAB solo en pestaña común
  if (tabKey === 'common') {
    scrollFab.classList.toggle('visible', state.scrollActive);
  } else {
    scrollFab.classList.remove('visible');
    stopScroll();
  }
}

// MODAL DE EDICIÓN
// ============================================================

function openNewSongEditor() {
  state.modalMode = 'new';
  modalTitle.textContent = 'Nueva canción';
  modalSongFields.classList.remove('hidden');
  modalContentLabel.textContent = 'Contenido (letra y acordes)';
  modalSongTitle.value = '';
  modalSongArtist.value = '';
  modalSongYoutube.value = '';
  modalContent.value = '';
  openModal();
}

function openCommonEditor() {
  const song = getSong(state.currentSongId);
  state.modalMode = 'common';
  modalTitle.textContent = `Editar: ${song.title}`;
  modalSongFields.classList.remove('hidden');
  modalContentLabel.textContent = 'Contenido (letra y acordes)';
  modalSongTitle.value = song.title;
  modalSongArtist.value = song.artist;
  modalSongYoutube.value = song.youtube || '';
  modalContent.value = song.content;
  openModal();
}

function openAnnotationEditor(key) {
  const song = getSong(state.currentSongId);
  if (state.profile !== key) return;
  state.modalMode = 'annotation';
  state.modalAnnotationKey = key;
  const prof = PROFILES[key];
  modalTitle.textContent = `Mis anotaciones: ${song.title}`;
  modalSongFields.classList.add('hidden');
  modalContentLabel.textContent = `Anotaciones de ${prof.name} (${prof.instrument})`;
  modalContent.value = song.annotations[key]?.content || '';
  openModal();
}

function openModal() {
  editModal.classList.add('open');
  setTimeout(() => modalContent.focus(), 300);
}

function closeModal() {
  editModal.classList.remove('open');
}

function saveModal() {
  if (state.modalMode === 'new') {
    const title = modalSongTitle.value.trim();
    if (!title) { showToast('El título no puede estar vacío'); return; }
    const newSong = {
      id: 's_' + Date.now(),
      title,
      artist: modalSongArtist.value.trim() || '',
      content: modalContent.value,
      youtube: modalSongYoutube.value.trim(),
      updatedBy: state.profile,
      updatedAt: new Date().toISOString(),
      annotations: {
        guitarra1: { content: '', updatedAt: null },
        guitarra2: { content: '', updatedAt: null },
        bajo:      { content: '', updatedAt: null },
        bateria:   { content: '', updatedAt: null }
      }
    };
    state.songs.push(newSong);
    saveSongs(state.songs);
    closeModal();
    renderSongList();
    showToast('Canción añadida · Recuerda subir a la nube');
    return;
  }

  const song = getSong(state.currentSongId);
  const idx = state.songs.findIndex(s => s.id === state.currentSongId);
  if (idx === -1) return;

  if (state.modalMode === 'common') {
    state.songs[idx].title   = modalSongTitle.value.trim() || song.title;
    state.songs[idx].artist  = modalSongArtist.value.trim() || song.artist;
    state.songs[idx].youtube = modalSongYoutube.value.trim();
    state.songs[idx].content = modalContent.value;
    state.songs[idx].updatedBy = state.profile;
    state.songs[idx].updatedAt = new Date().toISOString();
  } else if (state.modalMode === 'annotation') {
    const key = state.modalAnnotationKey;
    state.songs[idx].annotations[key].content   = modalContent.value;
    state.songs[idx].annotations[key].updatedAt = new Date().toISOString();
  }

  saveSongs(state.songs);
  closeModal();
  renderSongDetail();
  showToast('Guardado');
}

// ============================================================
// AUTO-SCROLL
// ============================================================

function startScroll() {
  state.scrollActive = true;
  btnScrollToggle.textContent = '⏸';
  btnScrollToggle.classList.remove('active');
  scrollFab.textContent = '⏸';
  scrollFab.classList.add('visible');
  scrollAccum = 0;
  lastScrollTime = performance.now();
  scrollRAF = requestAnimationFrame(scrollTick);
}

function stopScroll() {
  state.scrollActive = false;
  btnScrollToggle.textContent = '▶';
  scrollFab.textContent = '▶';
  if (scrollRAF) { cancelAnimationFrame(scrollRAF); scrollRAF = null; }
  if (state.currentTab === 'common') {
    scrollFab.classList.add('visible');
  } else {
    scrollFab.classList.remove('visible');
  }
}

function toggleScroll() {
  if (state.scrollActive) stopScroll();
  else startScroll();
}

function scrollTick(now) {
  if (!state.scrollActive) return;
  const dt = now - lastScrollTime;
  lastScrollTime = now;
  scrollAccum += (state.scrollSpeed * dt) / 1000;
  const pixels = Math.floor(scrollAccum);
  if (pixels > 0) {
    const area = document.getElementById('song-scroll-area');
    if (area) area.scrollTop += pixels;
    scrollAccum -= pixels;
  }
  scrollRAF = requestAnimationFrame(scrollTick);
}

// Acordes rápidos para mostrar como atajos
const QUICK_CHORDS = ['LAm','MIm','DO','RE','SOL','FA','SI','LA','MI','RE7','SOL7','FA#m','DOsus4','REsus4','SIb'];

// Normalizar entrada del usuario → clave en CHORD_DB
function normalizeChordKey(input) {
  let s = input.trim().toUpperCase()
    .replace(/[ÁA]/g, 'A').replace(/[ÉE]/g, 'E').replace(/[ÍI]/g, 'I')
    .replace(/[ÓO]/g, 'O').replace(/[ÚU]/g, 'U');
  // Quitar espacios
  s = s.replace(/\s+/g, '');
  // Normalizar "menor": min → m, menor → m
  s = s.replace(/MENOR/g, 'M').replace(/MIN/g, 'M');
  // Normalizar sostenido
  s = s.replace(/SOSTENIDO/g, '#');
  // Quitar /bajo (DO/SOL → DO)
  s = s.replace(/\/.*$/, '');
  return s;
}

// Construir diagrama SVG de un acorde
function buildChordSVG(variation) {
  const { fret, fingers } = variation;
  // fingers[0] = cuerda 6 (grave), fingers[5] = cuerda 1 (aguda)
  // En el diagrama mostramos de izquierda a derecha: cuerda 6 → cuerda 1

  const W = 160, H = 180;
  const marginLeft = 28, marginTop = 40;
  const stringSpacing = 22;
  const fretSpacing = 28;
  const numStrings = 6;
  const numFrets = 5;
  const nutY = marginTop;

  // Calcular el traste mínimo real (excluyendo 0 y -1)
  const frettedNotes = fingers.filter(f => f > 0);
  const minFret = frettedNotes.length ? Math.min(...frettedNotes) : 1;
  const startFret = fret > 0 ? fret : (minFret > 3 ? minFret : 1);
  const showFretNum = startFret > 1;

  let svg = `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="display:block">`;

  // Fondo
  const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const colLine = isDark ? '#5C5248' : '#C4BDB5';
  const colDot  = '#C2410C';
  const colText = isDark ? '#F5F0EB' : '#1C1917';
  const colOpen = isDark ? '#9CA3AF' : '#6B7280';
  const colNut  = isDark ? '#F5F0EB' : '#1C1917';

  // Cejuela o número de traste
  if (startFret === 1) {
    // Cejuela gruesa
    svg += `<rect x="${marginLeft}" y="${nutY - 4}" width="${stringSpacing * (numStrings-1)}" height="6" rx="2" fill="${colNut}"/>`;
  } else {
    svg += `<text x="${marginLeft - 8}" y="${nutY + fretSpacing * 0.6}" font-size="11" fill="${colText}" text-anchor="end" font-family="monospace">${startFret}</text>`;
    svg += `<line x1="${marginLeft}" y1="${nutY}" x2="${marginLeft + stringSpacing*(numStrings-1)}" y2="${nutY}" stroke="${colLine}" stroke-width="1.5"/>`;
  }

  // Trastes (líneas horizontales)
  for (let f = 1; f <= numFrets; f++) {
    const y = nutY + f * fretSpacing;
    svg += `<line x1="${marginLeft}" y1="${y}" x2="${marginLeft + stringSpacing*(numStrings-1)}" y2="${y}" stroke="${colLine}" stroke-width="1"/>`;
  }

  // Cuerdas (líneas verticales)
  for (let s = 0; s < numStrings; s++) {
    const x = marginLeft + s * stringSpacing;
    svg += `<line x1="${x}" y1="${nutY}" x2="${x}" y2="${nutY + numFrets * fretSpacing}" stroke="${colLine}" stroke-width="1.2"/>`;
  }

  // Puntos de los dedos y marcas
  for (let s = 0; s < numStrings; s++) {
    const x = marginLeft + s * stringSpacing;
    const f = fingers[s];

    if (f === -1) {
      // No se toca: X encima
      svg += `<text x="${x}" y="${nutY - 10}" font-size="12" fill="${colOpen}" text-anchor="middle" font-weight="bold">✕</text>`;
    } else if (f === 0) {
      // Al aire: círculo encima
      svg += `<circle cx="${x}" cy="${nutY - 10}" r="5" fill="none" stroke="${colOpen}" stroke-width="1.5"/>`;
    } else {
      // Dedo en traste
      const relFret = f - startFret + 1;
      if (relFret >= 1 && relFret <= numFrets) {
        const cy = nutY + (relFret - 0.5) * fretSpacing;
        svg += `<circle cx="${x}" cy="${cy}" r="9" fill="${colDot}"/>`;
      }
    }
  }

  // Detectar cejilla (varios dedos en el mismo traste mínimo)
  const barreCount = fingers.filter(f => f === minFret && minFret > 0).length;
  if (barreCount >= 4) {
    const relFret = minFret - startFret + 1;
    if (relFret >= 1 && relFret <= numFrets) {
      const cy = nutY + (relFret - 0.5) * fretSpacing;
      const firstS = fingers.indexOf(minFret);
      const lastS  = fingers.lastIndexOf(minFret);
      const x1 = marginLeft + firstS * stringSpacing;
      const x2 = marginLeft + lastS  * stringSpacing;
      svg += `<rect x="${x1-9}" y="${cy-9}" width="${x2-x1+18}" height="18" rx="9" fill="${colDot}" opacity="0.85"/>`;
    }
  }

  svg += `</svg>`;
  return svg;
}

function lookupChord(raw) {
  const key = normalizeChordKey(raw);
  // Buscar exacto primero
  if (CHORD_DB[key]) return { key, variations: CHORD_DB[key] };
  // Buscar parcial (por si hay alias)
  for (const k of Object.keys(CHORD_DB)) {
    if (k === key) return { key: k, variations: CHORD_DB[k] };
  }
  return null;
}

function renderChordResult(raw) {
  const result = document.getElementById('chord-result');
  if (!raw.trim()) { result.innerHTML = ''; return; }

  const found = lookupChord(raw);
  if (found) {
    let html = `<div class="chord-diagram">
      <div class="chord-name-display">${escapeHtml(raw)}</div>
      <div class="chord-svg-wrap">`;
    found.variations.forEach(v => {
      html += `<div class="chord-variation-item">
        <div class="chord-variation-label">${escapeHtml(v.label)}</div>
        ${buildChordSVG(v)}
      </div>`;
    });
    html += `</div>`;
    // Botón externo siempre disponible como referencia adicional
    const ugQuery = encodeURIComponent(raw.trim() + ' chord');
    html += `<a class="btn-external-chord" href="https://www.ultimate-guitar.com/search.php?search_type=chords&value=${ugQuery}" target="_blank" rel="noopener">🔗 Ver más en Ultimate Guitar</a>`;
    html += `</div>`;
    result.innerHTML = html;
  } else {
    // No encontrado: ofrecer búsqueda externa
    const ugQuery = encodeURIComponent(raw.trim() + ' chord guitar');
    result.innerHTML = `<div class="chord-not-found">
      <div style="font-size:1.8rem;margin-bottom:0.5rem">🤔</div>
      <div>No tengo el diagrama de <strong>${escapeHtml(raw)}</strong> en mi base de datos.</div>
      <div style="margin-top:0.25rem;font-size:0.82rem;color:var(--text3)">Puedes buscarlo en Ultimate Guitar:</div>
      <a class="btn-external-chord" href="https://www.ultimate-guitar.com/search.php?search_type=chords&value=${ugQuery}" target="_blank" rel="noopener">🔗 Buscar en Ultimate Guitar</a>
    </div>`;
  }
}

function openChordModal() {
  document.getElementById('chord-modal').classList.add('open');
  document.getElementById('chord-result').innerHTML = '';
  document.getElementById('chord-search-input').value = '';
  // Mostrar acordes rápidos de la canción actual
  renderQuickChordBtns();
  setTimeout(() => document.getElementById('chord-search-input').focus(), 300);
}

function closeChordModal() {
  document.getElementById('chord-modal').classList.remove('open');
}

function renderQuickChordBtns() {
  const container = document.getElementById('chord-quick-btns');
  // Mostrar acordes de la canción actual si hay una abierta, si no los comunes
  let chords = QUICK_CHORDS;
  if (state.currentSongId) {
    const song = getSong(state.currentSongId);
    if (song) {
      // Extraer acordes únicos del contenido
      const extracted = extractChordsFromContent(song.content);
      if (extracted.length > 0) chords = extracted;
    }
  }
  container.innerHTML = chords.slice(0, 20).map(c =>
    `<button class="chord-quick-btn" onclick="renderChordResult('${c.replace(/'/g,"\\'")}');document.getElementById('chord-search-input').value='${c.replace(/'/g,"\\'")}'">${escapeHtml(c)}</button>`
  ).join('');
}

function extractChordsFromContent(content) {
  const seen = new Set();
  const result = [];
  content.split('\n').forEach(line => {
    if (isChordLine(line)) {
      line.trim().split(/\s+/).forEach(token => {
        const clean = token.replace(/[()]/g, '');
        if (clean && isChordToken(clean) && !seen.has(clean)) {
          seen.add(clean);
          result.push(clean);
        }
      });
    }
  });
  return result;
}
